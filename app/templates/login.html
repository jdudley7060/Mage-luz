<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Mage-Luz MVP</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>Mage-Luz MVP</h1>
    <p>Login required. Resume + preferences + recommendations are user-gated.</p>
    {% if error %}<p style="color:#ff9090">{{ error }}</p>{% endif %}

    <section>
      <h2>Login</h2>
      <form action="/login" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </section>

    <section>
      <h2>Register</h2>
      <form action="/register" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <input type="text" name="preferred_locations" value="New York, San Francisco" />
        <button type="submit">Create account</button>
      </form>
    </section>
  </main>
</body>
</html>
