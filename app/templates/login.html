<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — Mage-Luz</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="wrap auth">
    <h1>Mage-Luz</h1>
    <p class="muted">Find the right roles fast. Tailor your resume in one click.</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}

    <section class="card">
      <h2>Sign in</h2>
      {% if linkedin_ready %}
      <p><a class="btn" href="/auth/linkedin/start">Continue with LinkedIn</a></p>
      {% else %}
      <p class="muted">LinkedIn OAuth not configured yet. Use email for now.</p>
      {% endif %}
      <form action="/login" method="post" class="stack">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </section>

    <section class="card">
      <h2>Create account</h2>
      <form action="/register" method="post" class="stack">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <input type="email" name="email" placeholder="Email" required />
        <input type="password" name="password" placeholder="Password" required />
        <button type="submit">Create account</button>
      </form>
    </section>
  </main>
</body>
</html>
