<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pick Role — Mage-Luz</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="wrap auth">
    <h1>Pick your target role</h1>
    <p class="muted">Based on your resume activity, choose the best lane to match jobs.</p>
    <section class="card">
      <form action="/roles/select" method="post" class="stack">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
        <label>Recommended roles</label>
        <select name="selected_role" required>
          {% for r in roles %}
          <option value="{{ r }}">{{ r }}</option>
          {% endfor %}
        </select>
        <button type="submit">Show best-fit jobs</button>
      </form>
    </section>
  </main>
</body>
</html>
